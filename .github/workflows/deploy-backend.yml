name: Build and deploy Node.js backend to Azure Web App

on:
  push:
    branches:
      - main # Or your default production branch
  workflow_dispatch:

env:
  # Replace with the exact name you gave your App Service in the portal
  AZURE_WEBAPP_NAME: 'keebstore-api' 
  # Ensure this matches the runtime stack you selected
  NODE_VERSION: '20.x' 

jobs:
  build:
    runs-on: ubuntu-latest
    
    # If your backend is in a subfolder (e.g., a monorepo), uncomment and update this:
    defaults:
      run:
        working-directory: ./server

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          # cache-dependency-path: './backend/package-lock.json' # uncomment if using a subfolder

      - name: Install dependencies and build
        run: |
          npm ci
          npm run build --if-present

      - name: Zip artifact for deployment
        run: zip release.zip ./* -r

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Unzip artifact for deployment
        run: unzip release.zip

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          # This pulls the secret we will set up in the next step
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }} 
          package: .