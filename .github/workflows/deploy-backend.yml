name: Build and deploy Node.js backend to Azure Web App

on:
  push:
    branches:
      - master # Or your default production branch
  workflow_dispatch:

env:
  # Replace with the exact name you gave your App Service in the portal
  AZURE_WEBAPP_NAME: 'portfolio-app-rico' 
  # Ensure this matches the runtime stack you selected
  NODE_VERSION: '20.x' 

jobs:
  build:
    runs-on: ubuntu-latest
    
    # If your backend is in a subfolder (e.g., a monorepo), uncomment and update this:
    defaults:
      run:
        working-directory: ./server

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          # cache-dependency-path: './backend/package-lock.json' # uncomment if using a subfolder

      - name: Install dependencies and build
        run: |
          npm install
          npm run build --if-present

      - name: List directory contents for debugging
        run: ls -la

      - name: Zip artifact for deployment
        run: |
          cd .. && zip -r server-release.zip server -x "server/node_modules/*" "server/.git/*"
          ls -lh server-release.zip

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: server-release.zip
          retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Unzip artifact for deployment
        run: |
          unzip -q server-release.zip
          ls -la

      - name: Verify publish profile
        run: |
          if [ -z "${{ secrets.AZURE_PUBLISH_PROFILE }}" ]; then
            echo "ERROR: AZURE_PUBLISH_PROFILE secret is not set!"
            exit 1
          fi
          echo "Publish profile is configured"

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
          package: ./server