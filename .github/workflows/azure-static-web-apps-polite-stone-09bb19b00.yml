name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - master

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Build
        run: npm run build
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_POLITE_STONE_09BB19B00 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }} # Used for Github integrations (i.e. PR comments)
          action: "upload"
          ###### Repository/Build Configurations - These values can be configured to match your app requirements. ######
          # For more information regarding Static Web App workflow configurations, please visit: https://aka.ms/swaworkflowconfig
          app_location: "/" # App source code path
          api_location: "" # API requires separate deployment - use App Service or Container Instances
          output_location: "dist" # Built app content directory - optional
          ###### End of Repository/Build Configurations ######
      - name: Test deployed frontend
        run: |
          echo "Waiting for deployment to stabilize..."
          sleep 5
          
          DEPLOYED_URL="https://polite-stone-09bb19b00.7.azurestaticapps.net"
          echo "Testing frontend at: $DEPLOYED_URL"
          
          for i in {1..10}; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$DEPLOYED_URL")
            
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✓ Frontend deployed successfully"
              echo ""
              echo "ℹ  Backend API setup:"
              echo "   The backend Express server is NOT deployed to Azure Static Web Apps"
              echo "   To enable /api calls, deploy your backend separately:"
              echo "   - Azure App Service (recommended)"
              echo "   - Azure Container Instances"
              echo "   - Or convert to Azure Functions"
              exit 0
            fi
            
            echo "Attempt $i/10 - waiting for frontend (HTTP $HTTP_CODE)..."
            sleep 2
          done
          
          echo "⚠ Frontend deployment may have issues"
          exit 0

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_POLITE_STONE_09BB19B00 }}
          action: "close"
