name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - master

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Install server dependencies
        run: npm install --prefix server
      - name: Test server connection (local)
        run: |
          echo "Testing local server startup..."
          node server/index.js &
          SERVER_PID=$!
          sleep 3
          
          echo "Testing /api/health endpoint on localhost..."
          for i in {1..10}; do
            if curl -f http://localhost:5000/api/health > /dev/null 2>&1; then
              echo "✓ Local server is running and /api is reachable"
              kill $SERVER_PID 2>/dev/null || true
              exit 0
            fi
            echo "Attempt $i/10 - waiting for server..."
            sleep 1
          done
          
          echo "✗ Server failed to respond after 10 attempts"
          kill $SERVER_PID 2>/dev/null || true
          exit 1
      - name: Build
        run: npm run build
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_POLITE_STONE_09BB19B00 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }} # Used for Github integrations (i.e. PR comments)
          action: "upload"
          ###### Repository/Build Configurations - These values can be configured to match your app requirements. ######
          # For more information regarding Static Web App workflow configurations, please visit: https://aka.ms/swaworkflowconfig
          app_location: "/" # App source code path
          api_location: "" # API requires separate deployment - use App Service or Container Instances
          output_location: "dist" # Built app content directory - optional
          ###### End of Repository/Build Configurations ######
      - name: Test deployed site - /api connection
        run: |
          echo "Waiting for deployment to complete..."
          sleep 10
          
          DEPLOYED_URL="https://polite-stone-09bb19b00.7.azurestaticapps.net"
          echo "Testing /api/health on deployed site: $DEPLOYED_URL/api/health"
          
          for i in {1..15}; do
            RESPONSE=$(curl -s -w "\n%{http_code}" "$DEPLOYED_URL/api/health")
            HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
            BODY=$(echo "$RESPONSE" | sed '$d')
            
            echo "Attempt $i/15 - HTTP Status: $HTTP_CODE"
            
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✓ Deployed site is live and /api/health is reachable"
              echo "Response: $BODY"
              exit 0
            fi
            
            sleep 2
          done
          
          echo "⚠ Warning: /api/health returned HTTP $HTTP_CODE"
          echo "⚠ Your backend server is NOT deployed to Azure Static Web Apps"
          echo "⚠ You need to deploy your Express server separately:"
          echo "   - Azure App Service"
          echo "   - Azure Container Instances"
          echo "   - Or convert to Azure Functions"
          exit 0  # Don't fail - deployment itself succeeded

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_POLITE_STONE_09BB19B00 }}
          action: "close"
